name: Weather Tracker CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: django_api

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Run Django Tests

        run: |

          python manage.py test

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: weather-frontend

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node

        uses: actions/setup-node@v4

        with:
          node-version: 22

      - name: Install Packages

        run: npm install

      - name: Build React

        run: npm run build